# =============================================================================
# Ory Kratos Email Courier Templates
# =============================================================================
# This file contains the Go text/template definitions for all email
# correspondence sent by Kratos. Each template type has three components:
#   - subject:     The email subject line
#   - body:        The HTML body (rich email)
#   - plaintext_body:  The plain-text fallback body
#
# Reference: https://www.ory.sh/docs/kratos/emails-courier
#
# These templates are mounted at /etc/config/kratos/courier/ and referenced
# by the `courier.channels[].config.templates` block in kratos.yml.
# =============================================================================

courier:
  templates:
    # -------------------------------------------------------------------------
    # Login Code — sent when a user authenticates via the "code" method
    # (one-time code delivered to their email address).
    # -------------------------------------------------------------------------
    login_code:
      subject: |
        Your login code for Admin Dashboard
      body: |
        <!DOCTYPE html>
        <html>
        <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <style>
            body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; background-color: #f4f6f8; }
            .container { max-width: 600px; margin: 40px auto; background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
            .header { background-color: #1a73e8; padding: 24px 32px; }
            .header h1 { color: #ffffff; margin: 0; font-size: 24px; font-weight: 600; }
            .body { padding: 32px; color: #333333; }
            .code { font-size: 36px; font-weight: 700; color: #1a73e8; text-align: center; letter-spacing: 4px; margin: 24px 0; }
            .footer { padding: 16px 32px; background-color: #f8f9fa; font-size: 12px; color: #666666; text-align: center; border-top: 1px solid #e9ecef; }
            p { line-height: 1.6; }
          </style>
        </head>
        <body>
          <div class="container">
            <div class="header">
              <h1>Admin Dashboard</h1>
            </div>
            <div class="body">
              <p>Hi {{.IdentityDisplayName}},</p>
              <p>Use the following code to sign in to your account:</p>
              <div class="code">{{.Code}}</div>
              <p>This code expires in {{.CodeLifespan}} minutes. If you did not request this code, you can safely ignore this email.</p>
            </div>
            <div class="footer">
              <p>Admin Dashboard &mdash; Automated login notification</p>
            </div>
          </div>
        </body>
        </html>
      plaintext_body: |
        Hi {{.IdentityDisplayName}},

        Use the following code to sign in to your account:

        {{.Code}}

        This code expires in {{.CodeLifespan}} minutes. If you did not request
        this code, you can safely ignore this email.

        ---
        Admin Dashboard — Automated login notification

    # -------------------------------------------------------------------------
    # Registration — sent when a new account is created (optional courtesy).
    # -------------------------------------------------------------------------
    registration:
      subject: |
        Welcome to Admin Dashboard
      body: |
        <!DOCTYPE html>
        <html>
        <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <style>
            body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; background-color: #f4f6f8; }
            .container { max-width: 600px; margin: 40px auto; background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
            .header { background-color: #1a73e8; padding: 24px 32px; }
            .header h1 { color: #ffffff; margin: 0; font-size: 24px; font-weight: 600; }
            .body { padding: 32px; color: #333333; }
            .footer { padding: 16px 32px; background-color: #f8f9fa; font-size: 12px; color: #666666; text-align: center; border-top: 1px solid #e9ecef; }
            p { line-height: 1.6; }
          </style>
        </head>
        <body>
          <div class="container">
            <div class="header">
              <h1>Welcome to Admin Dashboard</h1>
            </div>
            <div class="body">
              <p>Hi {{.IdentityDisplayName}},</p>
              <p>Your account has been successfully created.</p>
              <p>You can now sign in and start managing your dashboard.</p>
              <p style="text-align: center;">
                <a href="http://localhost:3000/login"
                   style="display: inline-block; padding: 12px 32px; background-color: #1a73e8; color: #ffffff; text-decoration: none; border-radius: 4px; font-weight: 600;">
                  Sign In
                </a>
              </p>
            </div>
            <div class="footer">
              <p>Admin Dashboard &mdash; Account registration notification</p>
            </div>
          </div>
        </body>
        </html>
      plaintext_body: |
        Hi {{.IdentityDisplayName}},

        Your account has been successfully created.

        You can now sign in and start managing your dashboard.

        Sign in here: http://localhost:3000/login

        ---
        Admin Dashboard — Account registration notification

    # -------------------------------------------------------------------------
    # Verification — sent when a user needs to verify their email address.
    # Contains a one-time verification code.
    # -------------------------------------------------------------------------
    verification:
      subject: |
        Verify your email address — Admin Dashboard
      body: |
        <!DOCTYPE html>
        <html>
        <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <style>
            body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; background-color: #f4f6f8; }
            .container { max-width: 600px; margin: 40px auto; background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
            .header { background-color: #1a73e8; padding: 24px 32px; }
            .header h1 { color: #ffffff; margin: 0; font-size: 24px; font-weight: 600; }
            .body { padding: 32px; color: #333333; }
            .code { font-size: 36px; font-weight: 700; color: #1a73e8; text-align: center; letter-spacing: 4px; margin: 24px 0; }
            .footer { padding: 16px 32px; background-color: #f8f9fa; font-size: 12px; color: #666666; text-align: center; border-top: 1px solid #e9ecef; }
            p { line-height: 1.6; }
          </style>
        </head>
        <body>
          <div class="container">
            <div class="header">
              <h1>Admin Dashboard</h1>
            </div>
            <div class="body">
              <p>Hi {{.IdentityDisplayName}},</p>
              <p>Please verify your email address by entering the code below:</p>
              <div class="code">{{.VerificationCode}}</div>
              <p>This code expires in {{.CodeLifespan}} minutes. If you did not create an account, you can safely ignore this email.</p>
            </div>
            <div class="footer">
              <p>Admin Dashboard &mdash; Email verification</p>
            </div>
          </div>
        </body>
        </html>
      plaintext_body: |
        Hi {{.IdentityDisplayName}},

        Please verify your email address by entering the code below:

        {{.VerificationCode}}

        This code expires in {{.CodeLifespan}} minutes. If you did not create
        an account, you can safely ignore this email.

        ---
        Admin Dashboard — Email verification

    # -------------------------------------------------------------------------
    # Recovery — sent when a user requests a password/account recovery.
    # Contains a one-time recovery code.
    # -------------------------------------------------------------------------
    recovery:
      subject: |
        Account recovery — Admin Dashboard
      body: |
        <!DOCTYPE html>
        <html>
        <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <style>
            body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; background-color: #f4f6f8; }
            .container { max-width: 600px; margin: 40px auto; background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
            .header { background-color: #dc3545; padding: 24px 32px; }
            .header h1 { color: #ffffff; margin: 0; font-size: 24px; font-weight: 600; }
            .body { padding: 32px; color: #333333; }
            .code { font-size: 36px; font-weight: 700; color: #dc3545; text-align: center; letter-spacing: 4px; margin: 24px 0; }
            .footer { padding: 16px 32px; background-color: #f8f9fa; font-size: 12px; color: #666666; text-align: center; border-top: 1px solid #e9ecef; }
            p { line-height: 1.6; }
            .warning { background-color: #fff3cd; border: 1px solid #ffc107; border-radius: 4px; padding: 12px 16px; color: #856404; margin: 16px 0; }
          </style>
        </head>
        <body>
          <div class="container">
            <div class="header">
              <h1>Admin Dashboard</h1>
            </div>
            <div class="body">
              <p>Hi {{.IdentityDisplayName}},</p>
              <p>We received a request to recover your account. Enter the following code to proceed:</p>
              <div class="code">{{.RecoveryCode}}</div>
              <p>This code expires in {{.CodeLifespan}} minutes.</p>
              <div class="warning">
                <strong>⚠ Did not request this?</strong> If you didn't ask for a recovery code,
                someone else might be trying to access your account. You can safely ignore this email.
              </div>
            </div>
            <div class="footer">
              <p>Admin Dashboard &mdash; Account recovery notification</p>
            </div>
          </div>
        </body>
        </html>
      plaintext_body: |
        Hi {{.IdentityDisplayName}},

        We received a request to recover your account. Enter the following code
        to proceed:

        {{.RecoveryCode}}

        This code expires in {{.CodeLifespan}} minutes.

        Did NOT request this?
        If you didn't ask for a recovery code, someone else might be trying to
        access your account. You can safely ignore this email.

        ---
        Admin Dashboard — Account recovery notification

    # -------------------------------------------------------------------------
    # Recovery Invalid — sent when someone tries to recover an unknown email.
    # Discreet: does NOT reveal whether the address is registered.
    # -------------------------------------------------------------------------
    recovery_invalid:
      subject: |
        Account recovery attempt — Admin Dashboard
      body: |
        <!DOCTYPE html>
        <html>
        <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <style>
            body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; background-color: #f4f6f8; }
            .container { max-width: 600px; margin: 40px auto; background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
            .body { padding: 32px; color: #333333; text-align: center; }
            .footer { padding: 16px 32px; background-color: #f8f9fa; font-size: 12px; color: #666666; text-align: center; border-top: 1px solid #e9ecef; }
            p { line-height: 1.6; }
          </style>
        </head>
        <body>
          <div class="container">
            <div class="body">
              <p>If an account with this email address exists, you will receive a recovery code shortly.</p>
              <p>If you did not request this, please disregard this message.</p>
            </div>
            <div class="footer">
              <p>Admin Dashboard &mdash; Account recovery notification</p>
            </div>
          </div>
        </body>
        </html>
      plaintext_body: |
        If an account with this email address exists, you will receive a
        recovery code shortly. If you did not request this, please disregard
        this message.

        ---
        Admin Dashboard — Account recovery notification
