# ==============================================================================
# nginx.conf — Nginx Reverse Proxy for Admin Dashboard Backend
# ==============================================================================
# This Nginx instance sits in front of PostgREST and Ory Oathkeeper.
# It provides:
#   - TLS termination (offloaded; expects a reverse proxy or LB in front)
#   - CORS headers
#   - Rate limiting
#   - Structured logging
#   - Route /api/* -> Oathkeeper decision endpoint (:4455)
# ==============================================================================

# ---------------------------------------------------------------------------
# Global settings
# ---------------------------------------------------------------------------
worker_processes  auto;
worker_rlimit_nofile  65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

# ---------------------------------------------------------------------------
# Events
# ---------------------------------------------------------------------------
events {
    multi_accept       on;
    worker_connections 65535;
    use                epoll;
}

# ---------------------------------------------------------------------------
# HTTP
# ---------------------------------------------------------------------------
http {
    # ---- MIME types ----
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---- Logging format ----
    log_format main_ext '$remote_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent" '
                        '$request_time $upstream_response_time';

    access_log  /var/log/nginx/access.log  main_ext;
    error_log   /var/log/nginx/error.log   warn;

    # ---- Performance tuning ----
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    keepalive_requests 1000;
    reset_timedout_connection on;
    client_body_timeout   30;
    client_header_timeout 30;
    send_timeout          30;

    # ---- Buffers ----
    client_body_buffer_size    128k;
    client_max_body_size       10m;
    client_header_buffer_size  2k;
    large_client_header_buffers 4 8k;

    # ---- Rate limiting zones ----
    # Define shared memory zones for rate limiting.
    # Each zone is keyed by the client IP address.

    # General API rate limit: 100 requests per second per IP
    limit_req_zone  $binary_remote_addr  zone=api_limit:10m  rate=100r/s;

    # Stricter burst limit for auth-related endpoints
    limit_req_zone  $binary_remote_addr  zone=auth_limit:10m  rate=20r/s;

    # Burst limit for write-heavy endpoints (POST/PUT/PATCH/DELETE)
    limit_req_zone  $binary_remote_addr  zone=write_limit:10m  rate=30r/s;

    # ---- Connection limiting ----
    limit_conn_zone  $binary_remote_addr  zone=addr:10m;
    limit_conn       addr  50;

    # ---- Gzip compression ----
    gzip             on;
    gzip_comp_level  2;
    gzip_min_length  1000;
    gzip_proxied     any;
    gzip_types
        application/json
        application/vnd.pgrst.object+json
        application/vnd.pgrst.array+json
        text/plain
        text/css
        application/javascript
        image/svg+xml;

    # ---- Proxy settings ----
    proxy_http_version      1.1;
    proxy_redirect          off;
    proxy_set_header        Host                $host;
    proxy_set_header        X-Real-IP           $remote_addr;
    proxy_set_header        X-Forwarded-For     $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto   $scheme;
    proxy_set_header        X-Request-ID        $request_id;
    proxy_buffering         off;
    proxy_buffer_size       4k;
    proxy_buffers           8 32k;
    proxy_busy_buffers_size 64k;

    # ---- SSL (terminated upstream; settings here for future direct use) ----
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers   HIGH:!aNULL:!MD5;
    # ssl_prefer_server_ciphers on;

    # -----------------------------------------------------------------------
    # UPSTREAM DEFINITIONS
    # -----------------------------------------------------------------------

    # ---- PostgREST API backend ----
    upstream postgrest_backend {
        # Use a simple round-robin. For sticky sessions (not needed with
        # PostgREST), add the 'sticky' directive.
        server postgrest:3000 max_fails=3 fail_timeout=10s;

        keepalive 32;
    }

    # ---- Ory Oathkeeper decision API (proxy endpoint :4455) ----
    upstream oathkeeper_decision {
        server oathkeeper:4455 max_fails=3 fail_timeout=10s;

        keepalive 16;
    }

    # -----------------------------------------------------------------------
    # SERVER BLOCK
    # -----------------------------------------------------------------------
    server {
        listen      80 default_server;
        listen      [::]:80 default_server;
        server_name _;

        # -------------------------------------------------------------------
        # Root health check (used by orchestrators / load balancers)
        # -------------------------------------------------------------------
        location = /health {
            access_log off;
            add_header Content-Type application/json;
            return 200 '{"status":"ok","service":"nginx","timestamp":"$time_iso8601"}';
        }

        # -------------------------------------------------------------------
        # API route — all /api/* requests go through Ory Oathkeeper
        # -------------------------------------------------------------------
        location /api/ {
            # Rate limiting
            limit_req  zone=api_limit   burst=50  nodelay;
            limit_req  zone=write_limit burst=20  nodelay;

            # Remove the /api prefix before forwarding to Oathkeeper
            rewrite ^/api/(.*)  /$1 break;

            # Proxy to Oathkeeper decision endpoint.
            # Oathkeeper will authenticate the request, then proxy to
            # PostgREST if the access rules are satisfied.
            proxy_pass  http://oathkeeper_decision;

            # CORS headers
            add_header Access-Control-Allow-Origin      $http_origin always;
            add_header Access-Control-Allow-Methods      "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers      "DNT, User-Agent, X-Requested-With, If-Modified-Since, Cache-Control, Content-Type, Range, Authorization, Accept, Accept-Profile, Content-Profile" always;
            add_header Access-Control-Expose-Headers     "Content-Length, Content-Range, ETag" always;
            add_header Access-Control-Allow-Credentials  "true" always;
            add_header Access-Control-Max-Age            86400 always;

            # Preflight (OPTIONS) handling
            if ($request_method = 'OPTIONS') {
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }

            # Add request ID for tracing
            add_header X-Request-ID $request_id always;
            add_header X-Upstream postgrest always;

            # Log upstream info
            access_log /var/log/nginx/api_access.log main_ext;
        }

        # -------------------------------------------------------------------
        # Direct PostgREST access (internal health checks, no auth)
        # -------------------------------------------------------------------
        location /internal/postgrest/ {
            # Only allow from internal IP ranges
            allow   10.0.0.0/8;
            allow   172.16.0.0/12;
            allow   192.168.0.0/16;
            deny    all;

            # Strip the prefix
            rewrite ^/internal/postgrest/(.*)  /$1 break;

            proxy_pass  http://postgrest_backend;
        }

        # -------------------------------------------------------------------
        # Deny all other requests
        # -------------------------------------------------------------------
        location / {
            # Return a clean 404 for unknown routes
            add_header Content-Type application/json;
            return 404 '{"error":"not_found","message":"The requested resource was not found."}';
        }
    }
}
