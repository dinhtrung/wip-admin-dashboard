# ==============================================================================
# postgrest.conf — PostgREST v12 Configuration
# ==============================================================================
# This file is mounted into the PostgREST container at
# /etc/postgrest.conf and controls all runtime behaviour.
# ==============================================================================

# ---------------------------------------------------------------------------
# Database connection
# ---------------------------------------------------------------------------
db-uri          = "postgres://postgrest:postgrest_password@postgres:5432/admin_dashboard?sslmode=disable"

# ---------------------------------------------------------------------------
# Schema configuration
# ---------------------------------------------------------------------------
# The 'api' schema holds our application tables.
# All other schemas (including 'public' owned by Kratos) are ignored.
db-schema        = "api"

# ---------------------------------------------------------------------------
# Roles
# ---------------------------------------------------------------------------
# db-anon-role is the role PostgREST falls back to when no valid JWT is
# provided or the JWT's role claim is missing/unknown.
db-anon-role     = "anonymous"

# ---------------------------------------------------------------------------
# Connection pooling
# ---------------------------------------------------------------------------
db-pool          = 10
db-pool-timeout  = 10

# ---------------------------------------------------------------------------
# Network / Port
# ---------------------------------------------------------------------------
server-host      = "0.0.0.0"
server-port      = 3000

# ---------------------------------------------------------------------------
# OpenAPI / Swagger
# ---------------------------------------------------------------------------
# ignore-privileges shows all endpoints in the docs even for the anon role.
# In production, remove this or set to 'follow-privileges'.
openapi-mode     = "ignore-privileges"
openapi-server-proxy-uri = "https://api.example.com"

# ---------------------------------------------------------------------------
# JWT / Authentication
# ---------------------------------------------------------------------------
# Replace this with your actual JWT secret in production.
# Must match the secret used by Ory Oathkeeper / Kratos.
jwt-secret       = "change-me-to-a-real-secret-in-production"

# The JWT audience to validate against (optional).
# jwt-aud          = "admin-dashboard"

# Name of the JWT claim that contains the user role.
# This is used by RLS policies via current_setting('request.jwt.claim.role').
jwt-role-claim-key = "role"

# ---------------------------------------------------------------------------
# Request processing
# ---------------------------------------------------------------------------
# Maximum request body size (default 1 MB)
max-rows         = 1000

# ---------------------------------------------------------------------------
# CORS
# ---------------------------------------------------------------------------
# CORS headers are primarily managed by the Nginx reverse proxy, but
# PostgREST also supports them directly for direct-access scenarios.
cors-allowed-origins = ["*"]

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
db-log-all-queries   = false
db-log-requests      = false
db-log-duration      = false

# ---------------------------------------------------------------------------
# Error handling
# ---------------------------------------------------------------------------
# PostgREST defaults are sensible; custom error messages can be configured
# via the 'db-pre-request' stored procedure if needed.
# db-pre-request = "api.pre_request"
